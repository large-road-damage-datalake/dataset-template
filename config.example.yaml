# Dataset Configuration File
# Copy this to config.yaml and edit it to match your dataset.

dataset_name: "RoadDamage2025" # Name of your dataset

# Task Type: object_detection, segmentation, classification
task_type: "object_detection"

# Format: 
#  - coco: Common Objects in Context JSON format
#  - yolo: Space-separated TXT files (class x y w h)
#  - voc: PASCAL VOC XML files
#  - image_folder: Folders named by class containing images
#  - png_masks: Images and corresponding PNG masks
format: "coco" 

# Define Splits EITHER via 'splits' (multi-split) OR 'data' (single split)

# Option A: Multi-split
splits:
  train:
    # Path to annotations file (COCO) or folder (YOLO/VOC)
    annotations: "annotations/train.json"
    # Root folder containing images
    images_root: "images/train"
  
  val:
    annotations: "annotations/val.json"
    images_root: "images/val"

# Option B: Single dataset (uncomment to use)
# data:
#   annotations: "annotations/all.json"
#   images_root: "images/"

# Note: Paths are relative to the repository root.
